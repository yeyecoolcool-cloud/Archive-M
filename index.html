<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive Vis - 双模式</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div class="brand">
        <div class="brand-title">Model · 双模式浏览</div>
        <div class="brand-sub">时间轴模式 + 图谱模式（行业 → 产品 → 刊期 → 广告）</div>
      </div>
      <div class="toolbar-center">
        <div class="filter-groups" id="tagRail"></div>
      </div>
      <div class="toolbar-right">
        <button class="btn" id="clearTagBtn">清空维度</button>
        <button class="btn primary" id="resetBtn">重置</button>
        <div class="view-switch" id="viewSwitch">
          <button class="btn view-toggle" id="viewToggleBtn" aria-expanded="false">视图</button>
          <div class="view-menu-panel" id="viewMenuPanel">
            <button class="mode-btn active" data-mode="timeline">时间轴模式</button>
            <button class="mode-btn" data-mode="graph">图谱模式</button>
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="vis-wrap">
        <div class="view active" id="timelineView">
          <div class="timeline-container" id="timelineContainer">
            <div class="timeline-stage" id="timelineStage"></div>
            <div class="timeline-axis-overlay" id="timelineAxisOverlay"></div>
          </div>
        </div>
        <div class="view" id="graphView">
          <div class="graph-header">
            <button class="btn" id="graphBackBtn">返回上一层</button>
            <div class="crumb" id="graphCrumb">图谱层级：行业</div>
          </div>
          <svg class="graph-svg" id="graphSvg"></svg>
        </div>
      </section>

      <aside class="sidebar">
        <section class="panel stats-panel">
          <div class="stats-panel-inner">
            <div class="panel-title">当前筛选状态</div>
            <div class="stats">
              <div class="stat-box">
                <div class="stat-box-inner">
                  <div class="stat-label">匹配广告</div>
                  <div class="stat-val" id="statAds">0</div>
                </div>
              </div>
              <div class="stat-box">
                <div class="stat-box-inner">
                  <div class="stat-label">覆盖刊期</div>
                  <div class="stat-val" id="statIssues">0</div>
                </div>
              </div>
              <div class="stat-box">
                <div class="stat-box-inner">
                  <div class="stat-label">行业数</div>
                  <div class="stat-val" id="statIndustries">0</div>
                </div>
              </div>
              <div class="stat-box">
                <div class="stat-box-inner">
                  <div class="stat-label">产品数</div>
                  <div class="stat-val" id="statProducts">0</div>
                </div>
              </div>
            </div>
          </div>
        </section>

        <section class="panel industry-panel">
          <div class="panel-title">行业 / 产品筛选</div>
          <div id="industryList"></div>
        </section>

        <section class="panel">
          <div class="panel-title">图谱说明</div>
          <div class="legend">
            图谱模式按层级钻取：行业 → 产品 → 刊期 → 广告。<br>
            点击任一节点可进入下一层，右上角“返回上一层”可回退。<br>
            画布支持拖动平移；触控板捏合或 Ctrl/Alt + 滚轮可缩放。<br>
            若同时用了顶部维度筛选和右侧产品筛选，图谱会实时联动。
          </div>
        </section>
      </aside>
    </main>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <div class="modal" id="detailModal">
    <div class="modal-card">
      <div class="modal-left">
        <img id="detailImg" alt="广告图">
      </div>
      <div class="modal-right">
        <div class="modal-head">
          <div class="modal-title" id="detailTitle">-</div>
          <button class="close-btn" id="closeModalBtn">×</button>
        </div>
        <div class="modal-content">
          <div class="meta-line" id="detailMeta"></div>
          <div class="detail-section">
            <div class="similar-title">维度编码</div>
            <div class="tag-box" id="detailTags"></div>
          </div>
          <div class="detail-divider"></div>
          <div class="detail-section">
            <div class="similar-title">相似广告</div>
            <div class="similar-row" id="similarRow"></div>
          </div>
        </div>
        <div class="modal-foot">
          <span id="detailFoot">-</span>
          <button class="btn" id="focusInGraphBtn">在图谱中定位</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
