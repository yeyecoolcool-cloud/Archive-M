<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive-M</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div class="brand">
        <div class="brand-title">Archive-M</div>
        <div class="brand-sub" data-i18n="brandSub">机联会刊广告数字化平台</div>
      </div>
      <div class="toolbar-center">
        <div class="filter-groups" id="tagRail"></div>
      </div>
      <div class="toolbar-right">
        <button class="btn lang-toggle" id="langToggleBtn" type="button">EN</button>
        <button class="btn primary" id="resetBtn" data-i18n="reset">重置</button>
        <div class="view-switch" id="viewSwitch">
          <button class="btn view-toggle" id="viewToggleBtn" aria-expanded="false" data-i18n="view">视图</button>
          <div class="view-menu-panel" id="viewMenuPanel">
            <button class="mode-btn active" data-mode="timeline" data-i18n="timelineMode">总览模式</button>
            <button class="mode-btn" data-mode="graph" data-i18n="graphMode">图谱模式</button>
            <button class="mode-btn" data-mode="visual" data-i18n="visualPanel">数量模式</button>
          </div>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="vis-wrap">
        <div class="view active" id="timelineView">
          <div class="timeline-container" id="timelineContainer">
            <div class="timeline-stage" id="timelineStage"></div>
            <div class="timeline-axis-overlay" id="timelineAxisOverlay"></div>
          </div>
        </div>
        <div class="view" id="graphView">
          <div class="graph-header">
            <button class="btn" id="graphBackBtn" data-i18n="back">返回上一层</button>
            <div class="crumb" id="graphCrumb">图谱层级：行业</div>
          </div>
          <svg class="graph-svg" id="graphSvg"></svg>
        </div>
        <div class="view" id="visualView">
          <div class="visual-panel-view">
            <div class="visual-heatmap-wrap" id="visualHeatmapWrap"></div>
            <div class="visual-controls-row">
              <div class="visual-axis-toggle" id="visualAxisToggle">
                <button class="visual-axis-btn active" type="button" data-axis="time" data-i18n="timeAxis">时间轴</button>
                <button class="visual-axis-btn" type="button" data-axis="industry" data-i18n="industryAxis">行业轴</button>
              </div>
              <div class="visual-metric-controls" id="visualMetricControls">
                <button class="visual-metric-btn active" type="button" data-metric="axisShare">行业→特征</button>
                <button class="visual-metric-btn" type="button" data-metric="tagShare">特征→行业</button>
              </div>
            </div>
            <div class="visual-axis" id="visualAxis"></div>
            <div class="visual-legend">
              <span data-i18n="less">少</span>
              <div class="visual-legend-scale"></div>
              <span data-i18n="more">多</span>
            </div>
          </div>
        </div>
      </section>

      <button class="sidebar-toggle" id="sidebarToggleBtn" type="button" aria-expanded="true" aria-label="收起筛选面板">›</button>
      <aside class="sidebar">
        <section class="panel industry-panel">
          <div class="panel-title" data-i18n="industryProductFilter">行业 / 产品筛选</div>
          <div id="industryList"></div>
        </section>
      </aside>

      <section class="analysis-drawer" id="analysisDrawer" aria-hidden="true">
        <div class="analysis-drawer-head">
          <div class="analysis-drawer-title-row">
            <div class="panel-title" data-i18n="analysisPanel">分析面板</div>
            <button class="analysis-collapse-btn" id="analysisCollapseBtn" type="button" aria-expanded="true">收起</button>
          </div>
          <div class="stats">
            <div class="stat-box"><div class="stat-box-inner"><div class="stat-label" data-i18n="matchedAds">匹配广告</div><div class="stat-val" id="statAds">0</div></div></div>
            <div class="stat-box"><div class="stat-box-inner"><div class="stat-label" data-i18n="coveredIssues">覆盖刊期</div><div class="stat-val" id="statIssues">0</div></div></div>
            <div class="stat-box"><div class="stat-box-inner"><div class="stat-label" data-i18n="industryCount">行业数</div><div class="stat-val" id="statIndustries">0</div></div></div>
            <div class="stat-box"><div class="stat-box-inner"><div class="stat-label" data-i18n="productCount">产品数</div><div class="stat-val" id="statProducts">0</div></div></div>
          </div>
          <div class="analysis-grid">
            <div class="analysis-kv">
              <span data-i18n="timeSpan">时间跨度</span>
              <strong id="analysisYearSpan">-</strong>
            </div>
          </div>
        </div>
        <div class="analysis-drawer-body">
          <div class="analysis-section analysis-section-wide analysis-curves-section">
            <div class="analysis-section-head">
              <div class="analysis-subtitle" data-i18n="industryDashboard">行业数量看板</div>
              <div class="analysis-unit-toggle" id="analysisCurveUnitToggle" aria-label="行业数量看板单位">
                <button class="analysis-unit-btn active" type="button" data-unit="year" data-i18n="yearUnit">年份</button>
                <button class="analysis-unit-btn" type="button" data-unit="issue" data-i18n="issueUnit">期刊</button>
              </div>
            </div>
            <div class="analysis-curves-grid" id="analysisIndustryCurves"></div>
          </div>
          <div class="analysis-section">
            <div class="analysis-subtitle" data-i18n="topFeatures">高频维度</div>
            <div class="analysis-tags" id="analysisTags"></div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <div class="modal" id="detailModal">
    <div class="modal-card">
      <div class="modal-left">
        <img id="detailImg" alt="广告图">
      </div>
      <div class="modal-right">
        <div class="modal-head">
          <div class="modal-title" id="detailTitle">-</div>
          <div class="modal-actions">
            <button class="detail-back-btn" id="detailBackBtn" type="button" hidden>返回</button>
            <button class="close-btn" id="closeModalBtn">×</button>
          </div>
        </div>
        <div class="modal-content">
          <div class="meta-line" id="detailMeta"></div>
          <div class="detail-section">
            <div class="similar-title" data-i18n="featureCodes">维度编码</div>
            <div class="tag-box" id="detailTags"></div>
          </div>
          <div class="detail-divider"></div>
          <div class="detail-section">
            <div class="similar-title" data-i18n="similarAds">相似广告</div>
            <div class="similar-row" id="similarRow"></div>
          </div>
        </div>
        <div class="modal-foot">
          <span id="detailFoot">-</span>
          <button class="btn" id="focusInGraphBtn">在图谱中定位</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
